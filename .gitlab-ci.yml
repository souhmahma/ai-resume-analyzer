# ─────────────────────────────────────────────────────────────────────────────
# GitLab CI/CD — ai-resume-analyzer
# Pipeline: lint → test (backend + frontend) → e2e → security → deploy
# ─────────────────────────────────────────────────────────────────────────────

image: python:3.11-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DJANGO_SETTINGS_MODULE: "config.settings_test"
  SECRET_KEY: "gitlab-ci-test-secret-key-32chars"
  DATABASE_URL: "sqlite:///test.db"
  CYPRESS_BASE_URL: "http://localhost:3000"

cache:
  paths:
    - .cache/pip
    - node_modules/

stages:
  - lint
  - test-backend
  - test-frontend
  - e2e
  - security
  - build
  - deploy

# ─── LINT ─────────────────────────────────────────────────────────────────────

lint:python:
  stage: lint
  script:
    - pip install flake8 black isort --quiet
    - flake8 . --max-line-length=100 --exclude=migrations,__pycache__,venv
    - black --check .
    - isort --check-only .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

lint:js:
  stage: lint
  image: node:20-slim
  script:
    - npm ci --silent
    - npx eslint src/ --ext .js,.jsx --max-warnings 0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ─── BACKEND TESTS ────────────────────────────────────────────────────────────

test:backend:unit:
  stage: test-backend
  script:
    - pip install -r requirements.txt -r requirements-test.txt --quiet
    - pytest tests/backend/unit/ -v
        --cov=.
        --cov-report=xml:coverage.xml
        --cov-report=term-missing
        --junitxml=junit-unit.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      junit: junit-unit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days
  needs: [lint:python]

test:backend:integration:
  stage: test-backend
  script:
    - pip install -r requirements.txt -r requirements-test.txt --quiet
    - pytest tests/backend/integration/ -v
        --junitxml=junit-integration.xml
  artifacts:
    when: always
    reports:
      junit: junit-integration.xml
    expire_in: 7 days
  needs: [lint:python]

# ─── FRONTEND TESTS ───────────────────────────────────────────────────────────

test:frontend:jest:
  stage: test-frontend
  image: node:20-slim
  script:
    - npm ci --silent
    - npm test -- --coverage --watchAll=false --ci
        --coverageReporters=cobertura
        --testResultsProcessor=jest-junit
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 7 days
  needs: [lint:js]

# ─── E2E TESTS ────────────────────────────────────────────────────────────────

test:e2e:cypress:
  stage: e2e
  image: cypress/included:13.6.0
  variables:
    CYPRESS_VIDEO: "false"
  script:
    - pip install -r requirements.txt --quiet
    - python manage.py migrate --settings=config.settings_test
    - python manage.py runserver 0.0.0.0:8000 --settings=config.settings_test &
    - npm ci --silent
    - npm run build
    - npx serve -s build -l 3000 &
    - sleep 5
    - npx cypress run --reporter junit --reporter-options "mochaFile=cypress-results.xml"
  artifacts:
    when: always
    paths:
      - cypress/screenshots/
      - cypress/videos/
    reports:
      junit: cypress-results.xml
    expire_in: 3 days
  needs: [test:backend:unit, test:frontend:jest]

# ─── SECURITY ────────────────────────────────────────────────────────────────

security:bandit:
  stage: security
  script:
    - pip install bandit --quiet
    - bandit -r . -ll -x ./tests,./venv,./node_modules --format json -o bandit-report.json || true
    - cat bandit-report.json
  artifacts:
    paths: [bandit-report.json]
    expire_in: 7 days
  allow_failure: true

security:npm-audit:
  stage: security
  image: node:20-slim
  script:
    - npm audit --audit-level=high
  allow_failure: true

# ─── BUILD ────────────────────────────────────────────────────────────────────

build:docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - |
      if [ "$CI_COMMIT_BRANCH" == "main" ]; then
        docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
        docker push $CI_REGISTRY_IMAGE:latest
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  needs: [test:e2e:cypress]

# ─── DEPLOY ───────────────────────────────────────────────────────────────────

deploy:staging:
  stage: deploy
  image: alpine:latest
  environment:
    name: staging
    url: https://staging.ai-resume-analyzer.com
  script:
    - echo "Deploying $CI_COMMIT_SHA to staging..."
    - apk add --no-cache curl openssh-client
    # Add your actual deploy steps here:
    # - ssh user@staging-server "docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA && docker-compose up -d"
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  needs: [build:docker]

deploy:production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: https://ai-resume-analyzer.com
  script:
    - echo "Deploying $CI_COMMIT_SHA to production..."
    # Add your actual deploy steps here
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual  # Requires manual approval for production
  needs: [build:docker]
