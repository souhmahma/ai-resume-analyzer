name: Marketplace Chat — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DATABASE_URL: "sqlite:///:memory:"
  REDIS_URL: "mock_url"
  EMAIL_HOST_USER: "test@gmail.com"
  EMAIL_HOST_PASSWORD: "password"
  GEMINI_API_KEY: "mock_key"
  DEBUG: "True"
  SECRET_KEY: "secret_for_test"

jobs:
  # ─── JOB 1: LINTING ───────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install flake8 black isort

      - name: Run isort check
        run: isort --check-only backend/ tests/ --profile black

      - name: Run black check
        run: black --check backend/ tests/

      - name: Run flake8
        run: flake8 backend/ tests/ --max-line-length=119 --exclude=venv,migrations,__pycache__ --ignore=E501,F401,F402,F541,F841,E402

  # ─── JOB 2: TESTS PYTEST ──────────────────────────────────────────────────
  tests:
    name: Pytest Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run tests with coverage
        env:
          # On maintient les variables de contexte ici pour Pytest
          DATABASE_URL: "sqlite:///:memory:"
          DJANGO_SETTINGS_MODULE: config.settings
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          pytest tests/ --cov=backend --cov-report=xml

  # ─── JOB 3: SECURITY SCAN ────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit
        run: bandit -r backend/ -s B105,B110

# ─── Docker Build ───────────────────────────────────────────
  docker-build:
    name: Docker Compose Check
    runs-on: ubuntu-latest
    needs: [tests, security]
    steps:
      - uses: actions/checkout@v4

      - name: Build and Start Services
        run: |
          docker compose build
          docker compose up -d

      - name: Health Check
        run: |
          sleep 15
          # Test du Backend
          curl -I http://localhost:8000/ | grep "HTTP/1.1" || (docker compose logs backend && exit 1)       
          # Test du Frontend
          curl -f http://localhost:80/ || (docker compose logs frontend && exit 1)

      - name: Shutdown
        run: docker compose down

  # ─── MODIFICATION DU JOB DEPLOY ──────────────────────────────────────────
  deploy:
    name: Deploy Notification
    runs-on: ubuntu-latest
    needs: [docker-build] 
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Success message
        run: echo "Everything is ready. Docker images validated and ready for deployment."
