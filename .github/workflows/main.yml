name: AI Resume Analyzer — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  # Variables pour éviter les erreurs "UndefinedValueError"
  SECRET_KEY: "ci-test-key-static-12345"
  DATABASE_URL: "sqlite:///:memory:"
  REDIS_URL: "redis://localhost:6379/0"
  GEMINI_API_KEY: "dummy-key-for-ci"
  DEBUG: "True"

jobs:
  # ─── JOB 1: LINTING (Vérifie la qualité du code) ──────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}

      - name: Install linters
        run: pip install flake8 black isort

      - name: Run flake8
        run: flake8 . --max-line-length=119 --exclude=venv,migrations,__pycache__ --ignore=E501,F401,F402,F541,F841,E402
  # ─── JOB 2: TESTS PYTEST ──────────────────────────────────────────────────
  tests:
    name: Pytest Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=xml

  # ─── JOB 3: SECURITY SCAN ────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit
        # Analyse les failles de sécurité dans le code Python
        run: bandit -r . --exclude ./venv,./tests -s B105,B110

  # ─── JOB 4: DOCKER CHECK ─────────────────────────────────────────────────
  docker-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t resume-analyzer:${{ github.sha }} .

  # ─── JOB 5: DEPLOY NOTIFICATION ──────────────────────────────────────────
  deploy:
    name: Deploy Notification
    runs-on: ubuntu-latest
    needs: [tests, security, docker-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Success message
        run: echo "🚀 Tous les checks ont réussi. Prêt pour le déploiement sur Railway !"
